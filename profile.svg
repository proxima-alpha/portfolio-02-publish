<svg width="360" height="360" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 18x18 viewBox — 1px padding all sides -->

  <!-- Headset band -->
  <rect x="5" y="1" width="8" height="1" fill="#FF5EFF"/>

  <!-- Headset band sides + head -->
  <rect x="4" y="2" width="10" height="1" fill="#FF5EFF"/>

  <!-- Head + ear cups -->
  <rect x="3" y="3" width="12" height="1" fill="#FF5EFF"/>

  <rect x="3" y="4" width="12" height="1" fill="#FF5EFF"/>

  <!-- Eye row -->
  <rect x="3" y="5" width="4" height="1" fill="#FF5EFF"/>
  <rect x="8" y="5" width="3" height="1" fill="#FF5EFF"/>
  <rect x="12" y="5" width="3" height="1" fill="#FF5EFF"/>

  <!-- Eye row 2 -->
  <rect x="2" y="6" width="5" height="1" fill="#FF5EFF"/>
  <rect x="8" y="6" width="3" height="1" fill="#FF5EFF"/>
  <rect x="12" y="6" width="4" height="1" fill="#FF5EFF"/>

  <rect x="2" y="7" width="14" height="1" fill="#FF5EFF"/>

  <!-- Mouth row -->
  <rect x="2" y="8" width="6" height="1" fill="#FF5EFF"/>
  <rect x="11" y="8" width="5" height="1" fill="#FF5EFF"/>
  <rect x="3" y="9" width="12" height="1" fill="#FF5EFF"/>

  <!-- Body -->
  <rect x="3" y="10" width="12" height="1" fill="#FF5EFF"/>
  <rect x="4" y="11" width="10" height="1" fill="#FF5EFF"/>
  <rect x="4" y="12" width="10" height="1" fill="#FF5EFF"/>

  <rect x="5" y="13" width="2" height="1" fill="#FF5EFF"/>
  <rect x="11" y="13" width="2" height="1" fill="#FF5EFF"/>

  <!-- Feet nubs -->
  <rect x="5" y="14" width="2" height="1" fill="#FF5EFF"/>
  <rect x="11" y="14" width="2" height="1" fill="#FF5EFF"/>

  <rect x="5" y="15" width="3" height="1" fill="#FF5EFF"/>
  <rect x="11" y="15" width="3" height="1" fill="#FF5EFF"/>
</svg>
